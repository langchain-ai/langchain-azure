name: langchain-azure-resilient-responses
description: >
  A resilient multi-node LangGraph workflow
  (plan → research → execute → summarize) hosted by Foundry over the Responses protocol,
  used to experiment with the resilient background responses feature and its
  composition with LangGraph's native checkpointer. It uses deterministic
  output by default and optionally supports a deployed Foundry model.
metadata:
  tags:
    - LangChain
    - LangGraph
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Resilience
    - Workflows
    - Model Optional
template:
  name: langchain-azure-resilient-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0

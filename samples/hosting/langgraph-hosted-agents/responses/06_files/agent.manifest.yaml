name: langchain-azure-agent-with-files-responses
description: >
  A LangGraph agent that reads files from a configurable data
  directory through local filesystem tools, hosted over the Responses
  protocol.
metadata:
  tags:
    - LangChain
    - LangGraph
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Files
    - Streaming
template:
  name: langchain-azure-agent-with-files-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

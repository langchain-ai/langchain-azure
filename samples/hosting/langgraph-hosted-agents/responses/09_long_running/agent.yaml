# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: lcaz-taskapi-long-e2e
description: |
    A long-running LangGraph workflow hosted by Foundry over the Responses protocol.
metadata:
    tags:
        - LangChain
        - LangGraph
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Long Running
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build

# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: langchain-azure-agent-recovery-responses
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: '0.25'
  memory: '0.5Gi'
environment_variables:
  - name: RECOVERY_STATE_DIR
    value: ${RECOVERY_STATE_DIR}
  - name: DEMO_CRASH_ONCE
    value: ${DEMO_CRASH_ONCE}

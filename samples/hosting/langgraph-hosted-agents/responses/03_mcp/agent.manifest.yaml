name: langchain-azure-agent-with-remote-mcp-responses
description: >
  A LangGraph agent that loads its tools from a remote MCP server
  (GitHub MCP by default) via langchain-mcp-adapters, hosted over the
  Responses protocol.
metadata:
  tags:
    - LangChain
    - LangGraph
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - MCP
    - Streaming
template:
  name: langchain-azure-agent-with-remote-mcp-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: GITHUB_PAT
      value: "{{GITHUB_PAT}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

name: langchain-azure-workflows-responses
description: >
  A multi-node LangGraph workflow (plan → tools → synthesize) hosted by
  Foundry over the Responses protocol. The same process also exposes the
  Invocations protocol on the same port via MultiProtocolHost; only the
  Responses entrypoint is declared here for deployment routing.
metadata:
  tags:
    - LangChain
    - LangGraph
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Workflows
    - Streaming
template:
  name: langchain-azure-workflows-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

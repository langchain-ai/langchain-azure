name: langchain-azure-agent-steering-responses
description: >
  A steerable LangGraph workflow hosted by Foundry over the Responses protocol.
metadata:
  tags:
    - LangChain
    - LangGraph
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Steering
template:
  name: langchain-azure-agent-steering-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: STEERING_STEPS
      value: "{{STEERING_STEPS}}"
    - name: STEERING_STEP_SECONDS
      value: "{{STEERING_STEP_SECONDS}}"

# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: langchain-azure-agent-steering-responses
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: '0.25'
  memory: '0.5Gi'
environment_variables:
  - name: STEERING_STEPS
    value: ${STEERING_STEPS}
  - name: STEERING_STEP_SECONDS
    value: ${STEERING_STEP_SECONDS}

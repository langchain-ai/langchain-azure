name: langchain-azure-agent-basic-invocations
description: >
  A basic LangGraph agent hosted by Foundry over the Invocations
  protocol (raw graph invoke/stream with a checkpointer).
metadata:
  tags:
    - LangChain
    - LangGraph
    - AI Agent Hosting
    - Azure AI AgentServer
    - Invocations Protocol
    - Streaming
template:
  name: langchain-azure-agent-basic-invocations
  kind: hosted
  protocols:
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

name: langchain-azure-agent-with-local-tools-invocations
description: >
  A LangGraph agent with local @tool functions hosted by Foundry over
  the Invocations protocol (raw graph invoke/stream).
metadata:
  tags:
    - LangChain
    - LangGraph
    - AI Agent Hosting
    - Azure AI AgentServer
    - Invocations Protocol
    - Streaming
template:
  name: langchain-azure-agent-with-local-tools-invocations
  kind: hosted
  protocols:
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

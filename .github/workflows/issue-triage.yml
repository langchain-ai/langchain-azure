name: Issue Triage

# Automatically triage new issues by applying package and type labels
# using GitHub Copilot CLI to analyze the issue content.
#
# ─── Required repository configuration ────────────────────────────────────────
#   Variables:
#     LANGCHAIN_AZURE_APP_CLIENT_ID  - Client ID of the GitHub App used to apply labels
#   Secrets:
#     LANGCHAIN_AZURE_APP_PRIVATE_KEY  - Private key of the GitHub App
#     LANGCHAIN_AZURE_COPILOT_TOKEN    - Fine-grained PAT with the "Copilot Requests"
#                               permission, used to authenticate the Copilot CLI
#
# ─── Security design ──────────────────────────────────────────────────────────
#
# This workflow is triggered by external (untrusted) user input — a GitHub issue
# title and body. The following protections are layered to reduce the attack
# surface at every stage of execution:
#
# 1. Read-only default token (`permissions: contents: read`)
#    The GITHUB_TOKEN available to all steps is restricted to read-only access.
#    All write operations (applying labels) are performed through a narrowly
#    scoped GitHub App installation token generated in the first step. This
#    limits damage if any step is unexpectedly compromised.
#
# 2. Scoped GitHub App token (`actions/create-github-app-token` with `repositories`)
#    The App token is restricted to this specific repository. Even if the triage
#    GitHub App is installed on other repositories in the organisation, the
#    token issued here cannot be used to modify them.
#
# 3. No shell interpolation of issue content (env-var + Python file write)
#    Issue title and body are passed to the Python script via environment
#    variables — they are never interpolated directly in the shell command.
#    This prevents shell injection: special characters (backticks, $(...),
#    quotes, etc.) in the issue text cannot execute arbitrary commands.
#
# 4. Issue body size cap (10 000 characters)
#    The body is truncated before it is written to issue.txt. This keeps the
#    payload sent to the AI model predictable, avoids token-limit failures, and
#    prevents a crafted issue from inflating processing costs.
#
# 5. Pinned Copilot CLI version (`@github/copilot@<version>`)
#    The npm package is installed at a specific, known-good version rather than
#    the implicit `latest`. A floating version would allow a supply-chain
#    compromise of the npm package to silently inject malicious code into every
#    workflow run. The version must be bumped intentionally when updating.
#
# 6. Job timeout (`timeout-minutes`)
#    A ceiling on total job duration prevents a hung or misbehaving Copilot CLI
#    invocation from consuming GitHub Actions minutes indefinitely.
#
# 7. Output allowlist (label validation before calling `gh`)
#    The JSON produced by the Copilot CLI is validated against hard-coded sets
#    of known-good label names before being passed to `gh issue edit`. An
#    unexpected model response (hallucination, prompt-injection attempt) is
#    silently dropped rather than forwarded as an arbitrary string to the
#    GitHub API.
# ──────────────────────────────────────────────────────────────────────────────

on:
  issues:
    types: [opened, reopened]

# Restrict the default GITHUB_TOKEN to read-only (security: item 1).
# All write operations are performed with the GitHub App installation token
# generated below, which is scoped to this repository only.
permissions:
  contents: read

jobs:
  triage:
    name: Triage with Copilot CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10  # security: item 6 — cap total job duration
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          # Client ID of the triage GitHub App (non-sensitive, stored as a variable)
          client-id: ${{ vars.LANGCHAIN_AZURE_APP_CLIENT_ID }}
          # Private key of the triage GitHub App (sensitive, stored as a secret)
          private-key: ${{ secrets.LANGCHAIN_AZURE_APP_PRIVATE_KEY }}
          # Restrict the issued token to this repository only (security: item 2).
          # Even if the App is installed on other repositories in the organisation,
          # the token cannot be used to modify them.
          repositories: ${{ github.event.repository.name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install GitHub Copilot CLI
        # Pin to a specific version to protect against supply-chain compromise
        # (security: item 5). Bump the version intentionally when updating.
        run: npm install -g @github/copilot@1.0.36

      - name: Write issue data to file
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Values are passed via environment variables, never interpolated in
          # the shell command, so special characters in the issue text cannot
          # execute arbitrary commands (security: item 3).
          python3 -c "
          import os
          title = os.environ['ISSUE_TITLE']
          body = os.environ.get('ISSUE_BODY', '')
          # Cap input size to keep the model payload predictable and bounded
          # (security: item 4).
          MAX_CHARS = 10_000
          body = body[:MAX_CHARS]
          with open('issue.txt', 'w') as f:
              f.write('Title: ' + title + '\n\nBody:\n' + body + '\n')
          "

      - name: Triage issue with GitHub Copilot CLI
        id: triage
        continue-on-error: true
        env:
          # Fine-grained PAT with the "Copilot Requests" permission.
          # GitHub App installation tokens cannot be used for Copilot CLI.
          COPILOT_GITHUB_TOKEN: ${{ secrets.LANGCHAIN_AZURE_COPILOT_TOKEN }}
        run: |
          PROMPT='Read the file issue.txt. It contains a GitHub issue title and body.

Select exactly one package label (or null if the issue is not clearly related to a specific package):
- langchain-azure-ai: Azure AI inference for chat models, embeddings, agents, vector stores, tools
- langchain-azure-dynamic-sessions: Azure Container Apps Dynamic Sessions integration
- langchain-sqlserver: SQL Server vector store integration
- langchain-azure-storage: Azure Storage integration (blob, table, queue, file shares)
- langchain-azure-postgresql: Azure PostgreSQL vector store integration

Select exactly one issue type label:
- bug: Something is broken or not working as expected
- enhancement: New feature or improvement request
- documentation: Documentation improvements, corrections, or additions
- question: Questions or requests for clarification

Write ONLY a JSON object (no markdown, no code blocks, no explanations) to the file labels.json.
Use exactly this format:
{"package_label": "<one package label name, or null>", "type_label": "<one type label name>"}

Examples:
{"package_label": "langchain-azure-ai", "type_label": "bug"}
{"package_label": null, "type_label": "question"}'

          echo "Running Copilot CLI to classify the issue..."
          # Flags:
          #   -s                  Silent mode — suppress session metadata so
          #                       only the agent's output appears in the logs.
          #   --allow-tool=write  Grant permission to write files (needed to
          #                       produce labels.json).
          #   --no-ask-user       Prevent the agent from prompting for input,
          #                       which would stall the non-interactive runner.
          copilot -p "$PROMPT" -s --allow-tool=write --no-ask-user
          echo "Copilot CLI exited with code $?"

      - name: Apply labels to issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ ! -f labels.json ]; then
            echo "labels.json not found — skipping label assignment"
            exit 0
          fi

          echo "labels.json contents:"
          cat labels.json

          # Parse both labels in a single Python call to avoid reading the file twice.
          # package_label may be JSON null (→ Python None) or the string "null" if the
          # model returned it as a quoted value; both cases are normalised to empty string.
          # Values are validated against the known-good allowlist before being used,
          # so an unexpected model response cannot pass arbitrary strings to `gh`
          # (security: item 7).
          read -r PACKAGE_LABEL TYPE_LABEL < <(python3 -c "
          import json, sys

          VALID_PACKAGE_LABELS = {
              'langchain-azure-ai',
              'langchain-azure-dynamic-sessions',
              'langchain-sqlserver',
              'langchain-azure-storage',
              'langchain-azure-postgresql',
          }
          VALID_TYPE_LABELS = {'bug', 'enhancement', 'documentation', 'question'}

          try:
              d = json.load(open('labels.json'))
              pkg = d.get('package_label')
              # Treat JSON null (None) and the literal string 'null' as absent
              pkg = pkg if pkg and pkg != 'null' else ''
              typ = d.get('type_label') or ''
              # Allowlist check — reject anything not in the predefined sets
              if pkg and pkg not in VALID_PACKAGE_LABELS:
                  print('Unknown package label: ' + pkg, file=sys.stderr)
                  pkg = ''
              if typ and typ not in VALID_TYPE_LABELS:
                  print('Unknown type label: ' + typ, file=sys.stderr)
                  typ = ''
              print(pkg + ' ' + typ)
          except Exception as e:
              print('Error parsing labels.json: ' + str(e), file=sys.stderr)
              print(' ')
          ")

          echo "Package label: '${PACKAGE_LABEL}'"
          echo "Type label:    '${TYPE_LABEL}'"

          LABELS=""
          [ -n "$PACKAGE_LABEL" ] && LABELS="$PACKAGE_LABEL"
          [ -n "$TYPE_LABEL" ] && LABELS="${LABELS:+${LABELS},}${TYPE_LABEL}"

          if [ -n "$LABELS" ]; then
            gh issue edit "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --add-label "$LABELS"
          else
            echo "No labels to apply"
          fi

name: test

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
        description: "From which folder this pipeline executes"

permissions:
  contents: read

env:
  UV_VERSION: "0.11.2"

jobs:
  build:
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.12"
    name: "make test #${{ matrix.python-version }}"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }} + uv ${{ env.UV_VERSION }}
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "${{ inputs.working-directory }}/uv.lock"

      - name: Run core tests
        shell: bash
        run: |
          make test
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}

      # The Deep Agents backend (langchain-azure-storage[deepagents]) is tested
      # against the Azurite emulator. The extra requires Python >= 3.11, so its
      # integration tests are gated to the 3.12 storage job; on 3.10 they are
      # skipped via collect_ignore_glob in the test conftest. Azurite is started
      # here (rather than via a `services:` block) so it does not run for the
      # other libraries that share this workflow.
      - name: Start Azurite
        if: ${{ contains(inputs.working-directory, 'azure-storage') && matrix.python-version == '3.12' }}
        shell: bash
        run: |
          docker run -d -p 10000:10000 \
            mcr.microsoft.com/azure-storage/azurite \
            azurite-blob --blobHost 0.0.0.0
          # Wait for the blob endpoint to accept connections before running
          # tests (`docker run -d` returns once the container is created, not
          # once Azurite is listening). Any HTTP response means the endpoint is
          # up; `curl` (without `--fail`) exits 0 for Azurite's 400 root reply
          # and only fails on a connection error.
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://127.0.0.1:10000/; then
              echo "Azurite is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Azurite did not become ready in time" >&2
          exit 1

      - name: Run Deep Agents backend integration tests against Azurite
        if: ${{ contains(inputs.working-directory, 'azure-storage') && matrix.python-version == '3.12' }}
        shell: bash
        run: |
          make integration_tests

      - name: Ensure the tests did not create any additional files
        shell: bash
        run: |
          set -eu

          STATUS="$(git status)"
          echo "$STATUS"

          # grep will exit non-zero if the target message isn't found,
          # and `set -e` above will cause the step to fail.
          echo "$STATUS" | grep 'nothing to commit, working tree clean'

---
name: "azure-cosmosdb Release"

on:
  workflow_dispatch:
    inputs:
      working-directory:
        required: true
        type: string
        default: "libs/azure-cosmosdb"
        description: "From which folder this pipeline executes"

jobs:
  release:
    uses: ./.github/workflows/_release.yml
    with:
      working-directory: ${{ inputs.working-directory }}
    permissions:
      contents: write
      id-token: write
    secrets: inherit
